<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Mídias em HTML5</h1>
    <h2>Imagem dinâmica</h2>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplismente aumente/diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="/imagens/P.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="/imagens/m.png" type="image/png">

        <img src="imagens/G.png" alt="Imagem flexível">
    </picture>
    <h2>Reproduzindo áudio</h2>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio autoplay controls>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <source src="midia/guanacast-33.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/guanacast-33.mp3">Clique aqui</a> para baixar o arquivo MP3</p>
    </audio>
</body>
</html>
