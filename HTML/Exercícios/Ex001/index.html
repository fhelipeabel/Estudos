<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Primeira Aula: Parágrafos</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Hello, World!</h1>
        <hr>
        <p>Este texto é um exemplo de quebra<br>de linha como<br>essa.</p>
        <p>Já este texto é um exemplo de parágrafo novo.</p>

        <p>
            Vamos colocar agora alguns símbolos:
        </p>
        <p>
            &real;
            &uparrow;
            &downarrow;
            &OpenCurlyQuote;
            &ord;
            &sigma;
        </p>
        <p>
            Agora vamos testar os emogis:
        </p>
        <p>
            &#x1F596
        </p>
    </body>
</html>
