<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com listas</h1>
    <h2>Listas Ordenadas</h2>
    <ol type="i" start="1">
        <li>Acordar</li>
        <li><ins>Ligar para o João</ins></li>
        <li>Tomar café</li>
        <li>Escovar os Dentes</li>
        <li>Organizar o trabalho do dia</li>
    </ol>
    <h2>Listas não Ordenadas</h2>
    <ul type="square"> <!--disc circle square-->
        <li>Pão</li>
        <li>Leite</li>
        <li>Tomate</li>
        <li>Alface</li>
        <li>Manteiga</li>
        <li>Arroz</li>
        <li>Feijão</li>
</body>
</html>
